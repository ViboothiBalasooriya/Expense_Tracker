<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Expense Tracker</h1>
            <div class="balance-container">
                <p>Total Balance</p>
                <h2 id="balance">$0.00</h2>
            </div>
        </header>

        <section class="summary">
            <div class="summary-card income">
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div class="summary-card expense">
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </section>

        <main class="main-content">
            <section class="transaction-history">
                <h3>Transaction History</h3>
                <ul id="list" class="list">
                    <!-- Transactions will be generated here -->
                </ul>
            </section>

            <section class="add-transaction">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Groceries..." required />
                    </div>
                    <div class="form-control">
                        <label for="amount">
                            Amount <br>
                            <small>(negative: expense, positive: income)</small>
                        </label>
                        <input type="number" id="amount" placeholder="e.g. -50 or 1500" step="any" required />
                    </div>
                    <button class="btn" type="submit">Add Transaction</button>
                </form>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
